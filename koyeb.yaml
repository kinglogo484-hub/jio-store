name: jio-store
services:
  - name: web
    type: web
    dockerfile: Dockerfile
    git:
      repository: <YOUR_GITHUB_USERNAME>/jio-store
      branch: main
    ports:
      - port: 3000
        protocol: http
    env:
      - key: SQLITE_PATH
        value: /data/jio_store.db
    volumes:
      - name: data
        path: /data
        size_gb: 1
